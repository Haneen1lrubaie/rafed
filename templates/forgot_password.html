{% extends 'base.html' %}
{% block title %}نسيت كلمة المرور — رفد{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div style="text-align:center;font-size:2.5rem;margin-bottom:.5rem;">🔐</div>
    <h2>نسيت كلمة المرور؟</h2>
    <p style="color:var(--gray);text-align:center;margin-bottom:1.5rem;font-size:.9rem;">
      أدخل بريدك الإلكتروني وسنرسل لك رابط إعادة التعيين
    </p>
    <form method="POST">
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" name="email" required placeholder="example@email.com">
      </div>
      <button type="submit" class="btn btn-primary btn-full">إرسال رابط إعادة التعيين</button>
    </form>
    <p class="auth-link"><a href="{{ url_for('login') }}">← العودة لتسجيل الدخول</a></p>
  </div>
</div>
{% endblock %}
