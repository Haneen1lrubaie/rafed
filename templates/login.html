{% extends 'base.html' %}
{% block title %}تسجيل الدخول — رفد{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h2>تسجيل الدخول</h2>
    <form method="POST">
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" name="email" required placeholder="example@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <div style="text-align:left;margin-bottom:1rem;">
        <a href="{{ url_for('forgot_password') }}" style="font-size:.85rem;color:var(--gray);">
          نسيت كلمة المرور؟
        </a>
      </div>
      <button type="submit" class="btn btn-primary btn-full">دخول</button>
    </form>
    <p class="auth-link">ليس عندك حساب؟ <a href="{{ url_for('register') }}">إنشاء حساب</a></p>
  </div>
</div>
{% endblock %}
