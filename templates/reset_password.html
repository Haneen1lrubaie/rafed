{% extends 'base.html' %}
{% block title %}إعادة تعيين كلمة المرور — رفد{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div style="text-align:center;font-size:2.5rem;margin-bottom:.5rem;">🔑</div>
    <h2>كلمة مرور جديدة</h2>
    <form method="POST">
      <div class="form-group">
        <label>كلمة المرور الجديدة</label>
        <input type="password" name="password" id="passInput" required
               placeholder="••••••••" minlength="6">
        <div class="pass-strength" id="passStrength"></div>
      </div>
      <div class="form-group">
        <label>تأكيد كلمة المرور</label>
        <input type="password" id="confirmPass" required placeholder="••••••••">
        <div id="matchStatus" class="field-status"></div>
      </div>
      <button type="submit" id="submitBtn" class="btn btn-primary btn-full">حفظ كلمة المرور</button>
    </form>
  </div>
</div>
<style>
.pass-strength{height:4px;border-radius:2px;margin-top:.5rem;transition:width .3s,background .3s;width:0}
.field-status{font-size:.82rem;margin-top:.3rem;min-height:1rem}
.field-status.ok{color:var(--green)}
.field-status.err{color:var(--red)}
</style>
<script>
const passInput   = document.getElementById('passInput');
const confirmPass = document.getElementById('confirmPass');
const passBar     = document.getElementById('passStrength');
const matchStatus = document.getElementById('matchStatus');
const submitBtn   = document.getElementById('submitBtn');

passInput.addEventListener('input', () => {
  const len = passInput.value.length;
  const colors = ['#E24B4A','#EF9F27','#1D9E75'];
  const widths  = ['33%','66%','100%'];
  const idx = len < 6 ? 0 : len < 10 ? 1 : 2;
  passBar.style.width      = len === 0 ? '0' : widths[idx];
  passBar.style.background = colors[idx];
  checkMatch();
});

confirmPass.addEventListener('input', checkMatch);

function checkMatch() {
  if (!confirmPass.value) { matchStatus.textContent=''; return; }
  if (passInput.value === confirmPass.value) {
    matchStatus.textContent = '✓ كلمتا المرور متطابقتان';
    matchStatus.className   = 'field-status ok';
    submitBtn.disabled = false;
  } else {
    matchStatus.textContent = '✗ كلمتا المرور غير متطابقتين';
    matchStatus.className   = 'field-status err';
    submitBtn.disabled = true;
  }
}
</script>
{% endblock %}
